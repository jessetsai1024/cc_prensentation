<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code 教戰守則</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.9/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* ============================================
     CSS VARIABLES
     ============================================ */
  :root {
    --bg-primary: #0f172a;
    --bg-slide: #1e293b;
    --bg-card: #334155;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-dim: #64748b;
    --accent: #38bdf8;
    --accent-glow: rgba(56, 189, 248, 0.25);
    --accent2: #f472b6;
    --accent3: #34d399;
    --accent4: #fbbf24;
    --danger: #f87171;
    --font-body: 'Noto Sans TC', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --radius: 16px;
    --transition-slide: 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }

  /* ============================================
     RESET & BASE
     ============================================ */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body, #root {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 28px;
    line-height: 1.6;
  }

  /* ============================================
     SLIDE CONTAINER
     ============================================ */
  .slides-viewport {
    position: relative;
    width: 100%; height: 100%;
    overflow: hidden;
  }

  .slide-wrapper {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    transition: transform var(--transition-slide), opacity var(--transition-slide);
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: thin;
    scrollbar-color: var(--text-dim) transparent;
  }

  .slide-wrapper::-webkit-scrollbar { width: 8px; }
  .slide-wrapper::-webkit-scrollbar-thumb {
    background: var(--text-dim); border-radius: 4px;
  }

  .slide-wrapper.current  { transform: translateX(0);    opacity: 1; z-index: 2; }
  .slide-wrapper.prev     { transform: translateX(-100%); opacity: 0; z-index: 1; }
  .slide-wrapper.next     { transform: translateX(100%);  opacity: 0; z-index: 1; }
  .slide-wrapper.hidden   { transform: translateX(100%);  opacity: 0; z-index: 0; pointer-events: none; }

  .slide {
    min-height: 100vh;
    padding: 60px 80px 120px;
    display: flex;
    flex-direction: column;
  }

  /* ============================================
     TYPOGRAPHY
     ============================================ */
  .slide h1 {
    font-size: 64px;
    font-weight: 900;
    letter-spacing: -1px;
    margin-bottom: 20px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .slide h2 {
    font-size: 48px;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--accent);
  }

  .slide h3 {
    font-size: 36px;
    font-weight: 700;
    margin-bottom: 12px;
    color: var(--text-primary);
  }

  .slide p, .slide li {
    font-size: 28px;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }

  .slide .subtitle {
    font-size: 32px;
    color: var(--text-secondary);
    margin-bottom: 40px;
  }

  .slide code, .slide .mono {
    font-family: var(--font-mono);
    background: var(--bg-card);
    padding: 2px 10px;
    border-radius: 6px;
    font-size: 0.9em;
  }

  .highlight { color: var(--accent); font-weight: 700; }
  .highlight-pink { color: var(--accent2); font-weight: 700; }
  .highlight-green { color: var(--accent3); font-weight: 700; }
  .highlight-yellow { color: var(--accent4); font-weight: 700; }

  /* ============================================
     CARDS & BOXES
     ============================================ */
  .card {
    background: var(--bg-card);
    border-radius: var(--radius);
    padding: 32px;
    margin: 16px 0;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .card-accent {
    border-left: 5px solid var(--accent);
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 24px;
    margin: 24px 0;
  }

  /* ============================================
     STEP ANIMATION ITEMS
     ============================================ */
  .step-item {
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .step-item.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .step-item.hidden-step {
    opacity: 0;
    transform: translateY(30px);
    pointer-events: none;
    height: 0;
    overflow: hidden;
    margin: 0;
    padding: 0;
  }

  .step-fade {
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .step-fade.visible { opacity: 1; transform: translateY(0); }
  .step-fade.pending { opacity: 0; transform: translateY(20px); }

  /* ============================================
     BOTTOM NAV BAR
     ============================================ */
  .nav-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 72px;
    background: rgba(15, 23, 42, 0.92);
    backdrop-filter: blur(12px);
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    z-index: 1000;
  }

  .nav-btn {
    min-width: 56px;
    min-height: 56px;
    padding: 8px 24px;
    border: none;
    border-radius: 12px;
    font-family: var(--font-body);
    font-size: 24px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .nav-btn-page {
    background: var(--accent2);
    color: var(--bg-primary);
  }
  .nav-btn-page:hover {
    background: #f9a8d4;
    transform: scale(1.05);
  }
  .nav-btn-page:disabled {
    background: var(--text-dim);
    cursor: not-allowed;
    transform: none;
  }

  .nav-btn-step {
    background: var(--accent);
    color: var(--bg-primary);
  }
  .nav-btn-step:hover {
    background: #7dd3fc;
    transform: scale(1.05);
  }
  .nav-btn-step:disabled {
    background: var(--text-dim);
    cursor: not-allowed;
    transform: none;
  }

  .nav-center {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .page-indicator {
    font-size: 22px;
    color: var(--text-dim);
    font-weight: 500;
    min-width: 100px;
    text-align: center;
  }

  .step-dots {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .step-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: all 0.3s ease;
  }
  .step-dot.active {
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent-glow);
    transform: scale(1.3);
  }
  .step-dot.done {
    background: var(--accent3);
  }

  /* ============================================
     PROGRESS BAR (top)
     ============================================ */
  .progress-bar {
    position: fixed;
    top: 0; left: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.4s ease;
    z-index: 1001;
    border-radius: 0 2px 2px 0;
  }

  /* ============================================
     FLOWCHART / DIAGRAM
     ============================================ */
  .flow-container {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0;
    margin: 30px 0;
  }

  .flow-box {
    padding: 20px 32px;
    border-radius: 14px;
    font-size: 26px;
    font-weight: 700;
    text-align: center;
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    min-width: 160px;
  }

  .flow-box.visible { opacity: 1; transform: scale(1); }
  .flow-box.pending { opacity: 0; transform: scale(0.7); }

  .flow-arrow {
    font-size: 40px;
    color: var(--text-dim);
    transition: all 0.4s ease;
    padding: 0 8px;
  }
  .flow-arrow.visible { opacity: 1; transform: translateX(0); }
  .flow-arrow.pending { opacity: 0; transform: translateX(-20px); }

  /* ============================================
     TITLE SLIDE SPECIAL
     ============================================ */
  .title-slide {
    justify-content: center;
    align-items: center;
    text-align: center;
    min-height: 100vh;
    position: relative;
    overflow: hidden;
  }

  .title-slide::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, var(--accent-glow), transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 0;
    animation: pulse-bg 4s ease-in-out infinite;
  }

  .title-slide > * { position: relative; z-index: 1; }

  .title-slide h1 { font-size: 80px; margin-bottom: 16px; }
  .title-slide .subtitle { font-size: 36px; }

  @keyframes pulse-bg {
    0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
    50%      { opacity: 0.7; transform: translate(-50%, -50%) scale(1.15); }
  }

  /* ============================================
     END SLIDE
     ============================================ */
  .end-slide {
    justify-content: center;
    align-items: center;
    text-align: center;
    min-height: 100vh;
  }

  /* ============================================
     KEYBOARD HINT
     ============================================ */
  .kbd-hint {
    position: fixed;
    top: 16px; right: 24px;
    font-size: 18px;
    color: var(--text-dim);
    z-index: 999;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .kbd {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 32px; height: 32px;
    padding: 0 8px;
    background: var(--bg-card);
    border: 1px solid var(--text-dim);
    border-radius: 6px;
    font-size: 16px;
    font-family: var(--font-mono);
    color: var(--text-secondary);
  }

  /* ============================================
     TABLE
     ============================================ */
  .slide table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    margin: 20px 0;
    border-radius: var(--radius);
    overflow: hidden;
  }

  .slide th {
    background: var(--accent);
    color: var(--bg-primary);
    padding: 16px 24px;
    font-size: 26px;
    font-weight: 700;
    text-align: left;
  }

  .slide td {
    padding: 14px 24px;
    font-size: 26px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    background: var(--bg-card);
  }

  .slide tr:last-child td { border-bottom: none; }

  /* ============================================
     ANIMATIONS
     ============================================ */
  @keyframes slideInUp {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .animate-in { animation: slideInUp 0.6s ease forwards; }
  .animate-fade { animation: fadeIn 0.5s ease forwards; }

  .delay-1 { animation-delay: 0.1s; opacity: 0; }
  .delay-2 { animation-delay: 0.2s; opacity: 0; }
  .delay-3 { animation-delay: 0.3s; opacity: 0; }
  .delay-4 { animation-delay: 0.4s; opacity: 0; }

  /* ============================================
     SHIMMER / SPARKLE TITLE ANIMATION
     ============================================ */
  @keyframes shimmer {
    0%   { background-position: -200% center; }
    100% { background-position: 200% center; }
  }

  .shimmer-title {
    font-size: 80px;
    font-weight: 900;
    letter-spacing: -1px;
    margin-bottom: 16px;
    background: linear-gradient(
      90deg,
      var(--accent) 0%,
      var(--accent2) 25%,
      #ffffff 50%,
      var(--accent2) 75%,
      var(--accent) 100%
    );
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: slideInUp 0.6s ease forwards, shimmer 3s linear infinite;
  }

  /* ============================================
     RESPONSIVE
     ============================================ */
  @media (max-width: 900px) {
    .slide { padding: 40px 32px 100px; }
    .slide h1 { font-size: 48px; }
    .title-slide h1, .shimmer-title { font-size: 56px; }
    .slide h2 { font-size: 36px; }
    .slide p, .slide li { font-size: 24px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

/* ==================================================================
   SLIDE DEFINITIONS
   ================================================================== */

// ─── Slide 1: 封面 ───
function SlideCover({ step }) {
  return (
    <div className="slide title-slide">
      <h1 className="shimmer-title">Claude Code 教戰守則</h1>
      <p className="subtitle animate-in delay-2">耀達科技 Jesse</p>
      <p className="animate-in delay-3" style={{color: 'var(--text-dim)', fontSize: '24px', marginTop: '20px'}}>
        2026 / 03 / 25
      </p>
    </div>
  );
}

// ─── Slide 2: 大綱 ───
function SlideOutline({ step }) {
  const items = [
    { num: '01', title: 'Claude Code 簡介', color: 'var(--accent)' },
    { num: '02', title: '基本設置', color: 'var(--accent2)' },
    { num: '03', title: '高階功能', color: 'var(--accent3)' },
    { num: '04', title: '實戰策略', color: 'var(--accent4)' },
  ];

  return (
    <div className="slide">
      <h2 className="animate-in">大綱</h2>
      <div style={{ marginTop: '40px', display: 'flex', flexDirection: 'column', gap: '24px' }}>
        {items.map((item, i) => (
          <div
            key={i}
            className={`card step-fade ${step > i ? 'visible' : 'pending'}`}
            style={{ display: 'flex', alignItems: 'center', gap: '28px', borderLeft: `5px solid ${item.color}` }}
          >
            <span style={{ fontFamily: 'var(--font-mono)', fontSize: '40px', fontWeight: 900, color: item.color }}>
              {item.num}
            </span>
            <span style={{ fontSize: '36px', fontWeight: 700 }}>{item.title}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ==================================================================
   SLIDES CONFIG
   ================================================================== */
const SLIDES = [
  { component: SlideCover, totalSteps: 0, title: '封面' },
  { component: SlideOutline, totalSteps: 4, title: '大綱' },
];

/* ==================================================================
   APP (主控制器)
   ================================================================== */
function App() {
  const [currentSlide, setCurrentSlide] = useState(0);
  const [currentStep, setCurrentStep] = useState(0);

  const slide = SLIDES[currentSlide];
  const canPrevPage  = currentSlide > 0;
  const canNextPage  = currentSlide < SLIDES.length - 1;
  const canPrevStep  = currentStep > 0;
  const canNextStep  = currentStep < slide.totalSteps;
  const hasSteps     = slide.totalSteps > 0;

  const goNextPage = useCallback(() => {
    if (!canNextPage) return;
    setCurrentSlide(s => s + 1);
    setCurrentStep(0);
  }, [canNextPage]);

  const goPrevPage = useCallback(() => {
    if (!canPrevPage) return;
    setCurrentSlide(s => s - 1);
    setCurrentStep(0);
  }, [canPrevPage]);

  const goNextStep = useCallback(() => {
    if (!canNextStep) return;
    setCurrentStep(s => s + 1);
  }, [canNextStep]);

  const goPrevStep = useCallback(() => {
    if (!canPrevStep) return;
    setCurrentStep(s => s - 1);
  }, [canPrevStep]);

  useEffect(() => {
    const el = document.querySelector('.slide-wrapper.current');
    if (el) el.scrollTop = 0;
  }, [currentSlide]);

  useEffect(() => {
    const handler = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      switch (e.key) {
        case 'ArrowRight': e.preventDefault(); goNextPage(); break;
        case 'ArrowLeft':  e.preventDefault(); goPrevPage(); break;
        case 'ArrowDown':  e.preventDefault(); goNextStep(); break;
        case 'ArrowUp':    e.preventDefault(); goPrevStep(); break;
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [goNextPage, goPrevPage, goNextStep, goPrevStep]);

  const getWrapperClass = (idx) => {
    if (idx === currentSlide) return 'slide-wrapper current';
    if (idx < currentSlide) return 'slide-wrapper prev';
    if (idx === currentSlide + 1) return 'slide-wrapper next';
    return 'slide-wrapper hidden';
  };

  const progress = SLIDES.length > 1 ? ((currentSlide) / (SLIDES.length - 1)) * 100 : 100;

  return (
    <>
      <div className="progress-bar" style={{ width: `${progress}%` }} />

      <div className="kbd-hint">
        <span className="kbd">←</span><span className="kbd">→</span>
        <span>換頁</span>
        <span style={{margin: '0 6px', color: 'var(--bg-card)'}}>│</span>
        <span className="kbd">↑</span><span className="kbd">↓</span>
        <span>換步</span>
      </div>

      <div className="slides-viewport">
        {SLIDES.map((s, idx) => {
          const SlideComp = s.component;
          return (
            <div key={idx} className={getWrapperClass(idx)}>
              <SlideComp step={idx === currentSlide ? currentStep : 0} />
            </div>
          );
        })}
      </div>

      <div className="nav-bar">
        <button className="nav-btn nav-btn-page" onClick={goPrevPage} disabled={!canPrevPage}>
          ◀◀ 上一頁
        </button>
        <button className="nav-btn nav-btn-step" onClick={goPrevStep} disabled={!canPrevStep}>
          ▲ 上一步
        </button>
        <div className="nav-center">
          <span className="page-indicator">
            {currentSlide + 1} / {SLIDES.length}
          </span>
          {hasSteps && (
            <div className="step-dots">
              {Array.from({ length: slide.totalSteps + 1 }, (_, i) => (
                <div
                  key={i}
                  className={`step-dot ${i === currentStep ? 'active' : i < currentStep ? 'done' : ''}`}
                />
              ))}
            </div>
          )}
        </div>
        <button className="nav-btn nav-btn-step" onClick={goNextStep} disabled={!canNextStep}>
          下一步 ▼
        </button>
        <button className="nav-btn nav-btn-page" onClick={goNextPage} disabled={!canNextPage}>
          下一頁 ▶▶
        </button>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
